version: "3.1"

rules:
- rule: Saluer l'utilisateur
  steps:
    - intent: greet
    - action: utter_greet

- rule: Au revoir
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: Hors sujet
  steps:
    - intent: out_of_scope
    - action: utter_out_of_scope

- rule: Activer le formulaire de vol
  steps:
    - intent: book_flight
    - action: flight_form
    - active_loop: flight_form

- rule: Soumettre le formulaire de vol
  condition:
    - active_loop: flight_form
  steps:
    - action: flight_form
    - active_loop: null
    - action: action_search_flights

- rule: Activer le formulaire d'hôtel
  steps:
    - intent: book_hotel
    - action: hotel_form
    - active_loop: hotel_form

- rule: Soumettre le formulaire d'hôtel
  condition:
    - active_loop: hotel_form
  steps:
    - action: hotel_form
    - active_loop: null
    - action: action_search_hotels

- rule: Sélectionner une option
  steps:
    - intent: select_option
    - action: action_select_option

- rule: Changer une option
  steps:
    - intent: change_option
    - action: action_change_option

- rule: Confirmer la réservation
  steps:
    - intent: confirm_reservation
    - action: action_confirm_reservation
    - action: utter_goodbye
